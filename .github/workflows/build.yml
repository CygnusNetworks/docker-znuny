name: Build Znuny image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Znuny version (e.g. 6.5.22 or 7.3.4)
        required: true
        default: "6.5.22"
      also_stable:
        description: Also tag series (X.Y); stable/latest only for STABLE_SERIES
        type: boolean
        default: true
  workflow_call:
    inputs:
      version:
        description: Znuny version
        required: true
        type: string
      also_stable:
        description: Also tag series (X.Y); stable/latest only for STABLE_SERIES
        type: boolean
        default: true

env:
  DEFAULT_VERSION: "6.5.22"
  # Which series gets the stable/latest moving tags (production series).
  STABLE_SERIES: "6.5"
  # GHCR package name must NOT be "znuny" — that private package is owned by
  # CygnusNetworks/znuny-docker (migration). GITHUB_TOKEN from this repo gets 403.
  GHCR_IMAGE: ghcr.io/cygnusnetworks/docker-znuny
  DOCKERHUB_IMAGE: docker.io/cygnusnetworks/znuny

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            ALSO_STABLE="${{ inputs.also_stable }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ] || [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            ALSO_STABLE="${{ inputs.also_stable }}"
          else
            VERSION="${DEFAULT_VERSION}"
            ALSO_STABLE="true"
          fi
          # normalize boolean
          case "${ALSO_STABLE}" in
            true|True|TRUE|1|yes) ALSO_STABLE=true ;;
            *) ALSO_STABLE=false ;;
          esac
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "also_stable=${ALSO_STABLE}" >> "$GITHUB_OUTPUT"
          echo "Building Znuny ${VERSION} (also_stable=${ALSO_STABLE})"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Org convention (same as other CygnusNetworks image repos)
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker metadata / tags
        id: meta
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ALSO_STABLE: ${{ steps.ver.outputs.also_stable }}
        run: |
          TAGS="${GHCR_IMAGE}:${VERSION},${DOCKERHUB_IMAGE}:${VERSION}"
          SERIES="${VERSION%.*}"
          if [ "${ALSO_STABLE}" = "true" ]; then
            TAGS="${TAGS},${GHCR_IMAGE}:${SERIES},${DOCKERHUB_IMAGE}:${SERIES}"
            # stable/latest stay pinned to the production series
            if [ "${SERIES}" = "${STABLE_SERIES}" ]; then
              TAGS="${TAGS},${GHCR_IMAGE}:stable,${DOCKERHUB_IMAGE}:stable"
              TAGS="${TAGS},${GHCR_IMAGE}:latest,${DOCKERHUB_IMAGE}:latest"
            fi
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            ZNUNY_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=znuny-${{ steps.ver.outputs.version }}
          cache-to: type=gha,scope=znuny-${{ steps.ver.outputs.version }},mode=max

      # One GitHub Release per exact Znuny version (tag = 6.5.22, not v6.5.22).
      # Rebuilds of an already-published version skip create (idempotent).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          ALSO_STABLE: ${{ steps.ver.outputs.also_stable }}
        run: |
          set -euo pipefail
          SERIES="${VERSION%.*}"
          UPSTREAM_TAG="rel-${VERSION//./_}"

          EXTRA_TAGS=()
          if [ "${ALSO_STABLE}" = "true" ]; then
            EXTRA_TAGS+=("\`${SERIES}\`")
            if [ "${SERIES}" = "${STABLE_SERIES}" ]; then
              EXTRA_TAGS+=("\`stable\`" "\`latest\`")
            fi
          fi
          if [ ${#EXTRA_TAGS[@]} -gt 0 ]; then
            ALSO_LINE="Also published as: $(IFS=', '; echo "${EXTRA_TAGS[*]}")"
          else
            ALSO_LINE="Only the exact version tag was published (series/stable/latest not updated)."
          fi

          DIGEST=""
          if DIGEST_LINE=$(docker buildx imagetools inspect "${GHCR_IMAGE}:${VERSION}" 2>/dev/null | grep -E '^Digest:' | head -1); then
            DIGEST="${DIGEST_LINE#Digest: }"
            DIGEST="${DIGEST// /}"
          fi
          DIGEST_LINE_MD="*(digest unavailable)*"
          if [ -n "${DIGEST}" ]; then
            DIGEST_LINE_MD="\`${DIGEST}\`"
          fi

          NOTES="$(cat <<EOF
          ## Znuny ${VERSION}

          Debian-based Docker image for [Znuny](https://www.znuny.org/) **${VERSION}**.

          ### Pull

          \`\`\`bash
          docker pull ${GHCR_IMAGE}:${VERSION}
          docker pull ${DOCKERHUB_IMAGE}:${VERSION}
          \`\`\`

          ### Tags

          - Exact: \`${VERSION}\`
          - ${ALSO_LINE}

          GHCR digest: ${DIGEST_LINE_MD}

          ### Upstream

          - Tarball: https://download.znuny.org/releases/znuny-${VERSION}.tar.gz
          - Source tag: [\`${UPSTREAM_TAG}\`](https://github.com/znuny/Znuny/releases/tag/${UPSTREAM_TAG})
          - Built from commit: \`${GITHUB_SHA}\`

          > Not an official Znuny GmbH image. Community packaging by CygnusNetworks.
          EOF
          )"
          # strip leading indent from heredoc
          NOTES="$(printf '%s\n' "${NOTES}" | sed 's/^          //')"

          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists — leaving notes unchanged (image was rebuilt)"
            exit 0
          fi

          LATEST_FLAG=(--latest=false)
          if [ "${SERIES}" = "${STABLE_SERIES}" ]; then
            LATEST_FLAG=(--latest)
          fi

          gh release create "${VERSION}" \
            --title "Znuny ${VERSION}" \
            --notes "${NOTES}" \
            --target "${GITHUB_SHA}" \
            "${LATEST_FLAG[@]}"

          echo "Created GitHub Release ${VERSION}"

      # Child rebuild: private docker-znuny-cygnus polls the public parent image
      # on a schedule (no custom secrets / PAT required on either side).
