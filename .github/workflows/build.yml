name: Build Znuny image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Znuny LTS version (e.g. 6.5.22)
        required: true
        default: "6.5.22"
      also_stable:
        description: Also tag as 6.5 / stable / latest
        type: boolean
        default: true
  workflow_call:
    inputs:
      version:
        description: Znuny LTS version
        required: true
        type: string
      also_stable:
        description: Also tag as 6.5 / stable / latest
        type: boolean
        default: true

env:
  DEFAULT_VERSION: "6.5.22"
  # GHCR package name must NOT be "znuny" — that private package is owned by
  # CygnusNetworks/znuny-docker (migration). GITHUB_TOKEN from this repo gets 403.
  GHCR_IMAGE: ghcr.io/cygnusnetworks/docker-znuny
  DOCKERHUB_IMAGE: docker.io/cygnusnetworks/znuny

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            ALSO_STABLE="${{ inputs.also_stable }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ] || [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            ALSO_STABLE="${{ inputs.also_stable }}"
          else
            VERSION="${DEFAULT_VERSION}"
            ALSO_STABLE="true"
          fi
          # normalize boolean
          case "${ALSO_STABLE}" in
            true|True|TRUE|1|yes) ALSO_STABLE=true ;;
            *) ALSO_STABLE=false ;;
          esac
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "also_stable=${ALSO_STABLE}" >> "$GITHUB_OUTPUT"
          echo "Building Znuny ${VERSION} (also_stable=${ALSO_STABLE})"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Org convention (same as other CygnusNetworks image repos)
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker metadata / tags
        id: meta
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ALSO_STABLE: ${{ steps.ver.outputs.also_stable }}
        run: |
          TAGS="${GHCR_IMAGE}:${VERSION},${DOCKERHUB_IMAGE}:${VERSION}"
          if [ "${ALSO_STABLE}" = "true" ]; then
            TAGS="${TAGS},${GHCR_IMAGE}:6.5,${DOCKERHUB_IMAGE}:6.5"
            TAGS="${TAGS},${GHCR_IMAGE}:stable,${DOCKERHUB_IMAGE}:stable"
            TAGS="${TAGS},${GHCR_IMAGE}:latest,${DOCKERHUB_IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            ZNUNY_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=znuny-${{ steps.ver.outputs.version }}
          cache-to: type=gha,scope=znuny-${{ steps.ver.outputs.version }},mode=max

      # Child rebuild: private docker-znuny-cygnus polls the public parent image
      # on a schedule (no custom secrets / PAT required on either side).
