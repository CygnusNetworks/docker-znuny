name: Watch Znuny LTS releases

on:
  schedule:
    # Daily 06:15 UTC
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: write
    outputs:
      version: ${{ steps.pick.outputs.version }}
      should_build: ${{ steps.pick.outputs.should_build }}
    steps:
      - name: Find latest Znuny LTS 6.5.x
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Tags look like rel-6_5_22
          mapfile -t REFS < <(
            gh api --paginate "repos/znuny/Znuny/git/matching-refs/tags/rel-6_5" \
              --jq '.[].ref' \
            | sed 's|refs/tags/||' \
            | grep -E '^rel-6_5_[0-9]+$'
          )

          LATEST=""
          LATEST_SORT=""
          for ref in "${REFS[@]}"; do
            # rel-6_5_22 -> 6.5.22
            ver="${ref#rel-}"
            ver="${ver//_/.}"
            # zero-pad patch for sort: 6.5.22 -> 000006.000005.000022
            IFS=. read -r a b c <<< "$ver"
            sortkey=$(printf '%06d.%06d.%06d' "$a" "$b" "$c")
            if [[ -z "${LATEST_SORT}" || "${sortkey}" > "${LATEST_SORT}" ]]; then
              LATEST_SORT="${sortkey}"
              LATEST="${ver}"
            fi
          done

          if [[ -z "${LATEST}" ]]; then
            echo "No rel-6_5_* tags found" >&2
            exit 1
          fi
          echo "Latest upstream LTS tag: ${LATEST}"

          # Confirm tarball + checksum exist
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://download.znuny.org/releases/znuny-${LATEST}.tar.gz")
          code_sum=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://download.znuny.org/releases/znuny-${LATEST}.tar.gz.sha256")
          if [[ "${code}" != "200" || "${code_sum}" != "200" ]]; then
            echo "Tarball not ready yet (tar=${code} sha=${code_sum}); skipping" >&2
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if GHCR already has this tag
          if docker manifest inspect "ghcr.io/cygnusnetworks/docker-znuny:${LATEST}" >/dev/null 2>&1; then
            echo "Image ghcr.io/cygnusnetworks/docker-znuny:${LATEST} already exists"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Image missing — will build ${LATEST}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.detect.outputs.version }}
      also_stable: true
    secrets: inherit
